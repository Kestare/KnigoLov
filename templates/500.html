{% extends "base.html" %}

{% block title %}Ошибка сервера - КнигоЛов{% endblock %}

{% block content %}
<div class="error-container">
  <div class="error-content">
    <div class="error-icon">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1>500</h1>
    <h2>Ошибка сервера</h2>
    <p>Что-то пошло не так на нашей стороне. Мы уже работаем над исправлением.</p>
    <a href="{{ url_for('index') }}" class="btn">
      <i class="fas fa-home"></i> Вернуться на главную
    </a>
  </div>
</div>

<style>
  .error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    text-align: center;
  }

  .error-content {
    max-width: 500px;
  }

  .error-icon {
    font-size: 6rem;
    color: #8e44ad;
    opacity: 0.5;
    margin-bottom: 2rem;
  }

  .error-content h1 {
    font-size: 5rem;
    color: #8e44ad;
    margin: 0;
    font-weight: 600;
  }

  .error-content h2 {
    color: #4a2c4a;
    margin-bottom: 1rem;
  }

  .error-content p {
    color: #666;
    margin-bottom: 2rem;
    font-size: 1.1rem;
  }

  .btn {
    background-color: #8e44ad;
    color: white;
    border: 2px solid #6c3483;
    padding: 12px 24px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    border-radius: 0;
    transition: all 0.3s ease;
    display: inline-block;
    text-decoration: none;
  }

  .btn:hover {
    background-color: #4169E1 !important;
    border-color: #2e4da8 !important;
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(65, 105, 225, 0.3);
  }
</style>
{% endblock %}
